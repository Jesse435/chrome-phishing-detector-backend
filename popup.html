<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SafeNest</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #050d1a;
    --bg2:       #0a1628;
    --bg3:       #0f1f38;
    --panel:     #0d1c30;
    --blue-core: #1a6bdb;
    --blue-hi:   #3d8fff;
    --blue-glow: #5aaeff;
    --cyan:      #00d4ff;
    --border:    rgba(58,130,220,0.22);
    --border-hi: rgba(90,174,255,0.45);
    --text-1:    #e8f1ff;
    --text-2:    #8aabcf;
    --text-3:    #4a6a8a;
    --safe:      #00e5a0;
    --warn:      #ffb340;
    --danger:    #ff3d5c;
    --safe-bg:   rgba(0,229,160,0.08);
    --warn-bg:   rgba(255,179,64,0.08);
    --danger-bg: rgba(255,61,92,0.08);
  }

  body {
    width: 320px;
    min-height: 200px;
    background: var(--bg);
    color: var(--text-1);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    overflow: hidden;
    position: relative;
  }

  /* ── grid texture overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,107,219,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,107,219,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── ambient glow ── */
  body::after {
    content: '';
    position: fixed;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 140px;
    background: radial-gradient(ellipse, rgba(26,107,219,0.22) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; padding: 0 0 14px; }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(180deg, #071324 0%, var(--bg2) 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue-hi), transparent);
    opacity: 0.6;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    position: relative;
    flex-shrink: 0;
  }

  .logo-icon svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 6px rgba(90,174,255,0.5));
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-1);
    line-height: 1;
  }

  .logo-text span {
    color: var(--cyan);
  }

  .logo-sub {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--text-3);
    text-transform: uppercase;
    margin-top: 2px;
    font-family: 'DM Sans', sans-serif;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-3);
    box-shadow: 0 0 0 2px rgba(74,106,138,0.2);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .status-dot.live {
    background: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.15), 0 0 8px rgba(0,212,255,0.4);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 3px rgba(0,212,255,0.15), 0 0 8px rgba(0,212,255,0.4); }
    50%      { box-shadow: 0 0 0 5px rgba(0,212,255,0.06), 0 0 16px rgba(0,212,255,0.6); }
  }

  /* ── BODY PADDING ── */
  .body { padding: 14px 16px 0; }

  /* ── STATUS CARD ── */
  .status-card {
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 14px 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s, background 0.4s;
  }

  .status-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-hi), transparent);
    opacity: 0.4;
    transition: opacity 0.4s, background 0.4s;
  }

  .status-card.safe   { border-color: rgba(0,229,160,0.3); background: var(--safe-bg); }
  .status-card.safe::before { background: linear-gradient(90deg, transparent, var(--safe), transparent); opacity: 0.7; }

  .status-card.warn   { border-color: rgba(255,179,64,0.3); background: var(--warn-bg); }
  .status-card.warn::before { background: linear-gradient(90deg, transparent, var(--warn), transparent); opacity: 0.7; }

  .status-card.danger { border-color: rgba(255,61,92,0.35); background: var(--danger-bg); }
  .status-card.danger::before { background: linear-gradient(90deg, transparent, var(--danger), transparent); opacity: 0.7; }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .status-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-2);
    transition: color 0.4s;
  }
  .status-label.safe   { color: var(--safe); }
  .status-label.warn   { color: var(--warn); }
  .status-label.danger { color: var(--danger); }

  /* ── SCORE RING ── */
  .score-ring {
    position: relative;
    width: 52px; height: 52px;
    flex-shrink: 0;
  }

  .score-ring svg {
    width: 52px; height: 52px;
    transform: rotate(-90deg);
  }

  .score-ring .track {
    fill: none;
    stroke: rgba(26,107,219,0.15);
    stroke-width: 3.5;
  }

  .score-ring .fill {
    fill: none;
    stroke: var(--blue-hi);
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-dasharray: 138.2;
    stroke-dashoffset: 138.2;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.34,1.56,0.64,1), stroke 0.4s;
  }

  .score-val {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text-1);
    line-height: 1;
  }

  .score-val small {
    font-size: 8px;
    color: var(--text-3);
    letter-spacing: 0.08em;
    margin-top: 1px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }

  /* ── BAR ── */
  .risk-bar-wrap { margin-top: 2px; }

  .risk-bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-3);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .risk-bar {
    height: 4px;
    border-radius: 2px;
    background: rgba(26,107,219,0.15);
    overflow: hidden;
  }

  .risk-bar-fill {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    background: linear-gradient(90deg, var(--blue-core), var(--blue-hi));
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1), background 0.4s;
  }
  .risk-bar-fill.safe   { background: linear-gradient(90deg, #00b87a, var(--safe)); }
  .risk-bar-fill.warn   { background: linear-gradient(90deg, #e07800, var(--warn)); }
  .risk-bar-fill.danger { background: linear-gradient(90deg, #c40028, var(--danger)); }

  /* ── REASONS ── */
  .reasons-wrap {
    margin-bottom: 12px;
    display: none;
  }

  .reasons-title {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .reasons-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .reason-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    background: var(--bg2);
    border: 1px solid var(--border);
    margin-bottom: 5px;
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.45;
    animation: slide-in 0.3s ease both;
  }

  .reason-item:last-child { margin-bottom: 0; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .reason-icon {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,61,92,0.15);
    border: 1px solid rgba(255,61,92,0.3);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .reason-icon::after {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--danger);
  }

  /* ── IDLE MESSAGE ── */
  .idle-msg {
    text-align: center;
    padding: 8px 0 4px;
    color: var(--text-3);
    font-size: 12px;
    letter-spacing: 0.02em;
  }

  /* ── ANALYZE BUTTON ── */
  .analyze-btn {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, var(--blue-core) 0%, #0d4fb5 100%);
    border: 1px solid var(--blue-hi);
    border-radius: 8px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 0 20px rgba(26,107,219,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
    margin-bottom: 10px;
  }

  .analyze-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.5s;
  }

  .analyze-btn:hover::before { left: 160%; }
  .analyze-btn:hover {
    box-shadow: 0 0 30px rgba(26,107,219,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
    transform: translateY(-1px);
  }
  .analyze-btn:active { transform: translateY(0); }

  .analyze-btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-icon { width: 14px; height: 14px; }

  /* spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── AUTO SCAN TOGGLE ── */
  .auto-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
  }

  .auto-label {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }

  .toggle-wrap {
    position: relative;
    width: 36px; height: 20px;
  }

  .toggle-wrap input {
    position: absolute;
    opacity: 0; width: 0; height: 0;
  }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-3);
    transition: transform 0.25s, background 0.25s;
  }

  .toggle-wrap input:checked ~ .toggle-track {
    background: rgba(26,107,219,0.3);
    border-color: var(--blue-hi);
  }

  .toggle-wrap input:checked ~ .toggle-track::after {
    transform: translateX(16px);
    background: var(--cyan);
    box-shadow: 0 0 6px rgba(0,212,255,0.5);
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-3);
    text-transform: uppercase;
  }

</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield outer -->
          <path d="M16 2L4 7V16C4 22.627 9.373 28 16 30C22.627 28 28 22.627 28 16V7L16 2Z"
                fill="rgba(26,107,219,0.18)"
                stroke="url(#sg)" stroke-width="1.2"/>
          <!-- Shield inner accent -->
          <path d="M16 5.5L7 9.5V16C7 21.075 11.025 25.42 16 27C20.975 25.42 25 21.075 25 16V9.5L16 5.5Z"
                fill="rgba(26,107,219,0.12)"
                stroke="rgba(90,174,255,0.4)" stroke-width="0.8"/>
          <!-- Checkmark / signal lines -->
          <path d="M12 16L14.5 18.5L20 13" stroke="#00d4ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="sg" x1="16" y1="2" x2="16" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#5aaeff"/>
              <stop offset="1" stop-color="#1a6bdb"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div>
        <div class="logo-text">SAFE<span>NEST</span></div>
        <div class="logo-sub">Threat Intelligence</div>
      </div>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- STATUS CARD -->
    <div class="status-card" id="statusCard">
      <div class="status-row">
        <div>
          <div class="status-label" id="statusLabel">Awaiting Scan</div>
        </div>
        <div class="score-ring" id="scoreRing">
          <svg viewBox="0 0 52 52">
            <circle class="track" cx="26" cy="26" r="22"/>
            <circle class="fill" id="ringFill" cx="26" cy="26" r="22"/>
          </svg>
          <div class="score-val">
            <span id="scoreNum">—</span>
            <small>RISK</small>
          </div>
        </div>
      </div>
      <div class="risk-bar-wrap">
        <div class="risk-bar-labels">
          <span>Low</span><span>Medium</span><span>High</span>
        </div>
        <div class="risk-bar">
          <div class="risk-bar-fill" id="riskFill"></div>
        </div>
      </div>
    </div>

    <!-- REASONS -->
    <div class="reasons-wrap" id="reasonsWrap">
      <div class="reasons-title">Detection signals</div>
      <div id="reasonsList"></div>
    </div>

    <!-- IDLE -->
    <div class="idle-msg" id="idleMsg">Run a scan to analyze the current site.</div>

    <!-- ANALYZE BUTTON -->
    <button class="analyze-btn" id="analyzeBtn">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <svg class="btn-icon" id="btnIcon" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6.5" stroke="white" stroke-width="1.2" stroke-dasharray="2 2"/>
          <path d="M8 5V8L10 10" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span id="btnText">Analyze Site</span>
      </div>
    </button>

    <!-- AUTO SCAN -->
    <div class="auto-row">
      <span class="auto-label">Auto-scan on open</span>
      <label class="toggle-wrap">
        <input type="checkbox" id="autoToggle">
        <div class="toggle-track"></div>
      </label>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">SafeNest v1.1 &nbsp;·&nbsp; AI-Assisted Detection</div>

</div>

<script src="popup.js"></script>
<script src="ui.js"></script>

</body>
</html>
